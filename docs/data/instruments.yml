ibqr:
  measure: Infant Behavior Questionnaire-Revised VSF+BI
  notes: null
  acronym: IBQ-R
  full_name: Infant Behavior Questionnaire-Revised Very Short Form + Behavioral Inhibition
  domain: Behavior & Caregiver-Child Interactions
  table_name: mh_cg_ibqr
  construct: Behavioral Inhibition Negative Affectivity Effortful Control Surgency
    / Extraversion
  concatenated: null
  visits: V03, V05
  child_specific: 'Yes'
  type: Parent Survey
  respondent_notes: Primary caregiver
  admin_notes: null
  remote: remote
  duration: 7-10 min
  qc:
  - Examine missingness by counting items answered per participant.
  - Check age is within expected ranges.
  - Review summary statistics and visualizations (item frequencies, age, prorated
    scores).
  - Assess reliability (Cronbach’s α).
  warning1: Interpreting Data
  warning1_text: The IBQ-R (VSF)+BI and ECBQ (VSF)+BI measure normative variations
    in infant and child behavior and should be interpreted in the context of the child’s
    age and developmental stage. These instruments are not clinical or diagnostic
    tools.
  warning2: IBQ-R vs ECBQ Administration at V05
  warning2_text: 'At V05 (10–17 months), participants could be administered either
    the IBQ-R (validated for ages 3–12 months) or the ECBQ (validated for ages 18–36
    months), depending on their age at the visit. Because no validated measure exists
    for 12–18 months, researchers are advised to select the instrument that best aligns
    with their study design. The HBCD protocol spans this age gap, so the decision
    was made to administer the IBQ-R to all infants at V03 and V05.


    However, early in data collection, the ECBQ was inadvertently administered to
    infants older than 12 months (N=78). In a small number of cases (N=10), caregivers
    had not completed all of their V05 remote surveys before the child aged into the
    ECBQ range, resulting in both measures being administered at V05. Although IBQ-R
    and ECBQ assess similar constructs, they are not interchangeable. Users should
    review measure-specific properties before incorporating these data into analyses.'
  warning3: null
  warning3_text: null
  warning4: null
  warning4_text: null
