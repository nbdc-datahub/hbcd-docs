  warning1_title: USDTL Screening Updates
  warning1: As of November 2025, USDTL no longer assayed sufentanil in the nail samples.
  warning2_title: Continuous Variables
  warning2: Continuous variables should be interpreted with caution based on limits
    of quantification (LOQ), i.e. the minimum concentration at which metabolites can
    be reliably quantified. See <a href="#nails-table1">Urine Assay Thresholds for
    Analytes</a>.
  warning3_title: Updated Workflow
  warning3: As of July 1, 2024, the nail processing workflow was updated to optimize
    specimen use and allow confirmation testing for low sample quantities. Prior to
    this update, remnants of ELISA extract were not used for confirmation when specimens
    had insufficient sample.
  warning4_title: Large Gaps Between Collection and Analysis Dates
  warning4: A substantial number of samples show unusually long intervals between
    collection and analysis (e.g., over 100–300 days, compared to the 30-day limit
    specified by internal SOPs). We are working to determine whether this reflects
    a data entry or site-level issue and will provide an update once more information
    is available.
  warning5_title: Interpretation of “QNS” in Confirmatory Results When a Positive
    Is Expected
  warning5: In some cases, a specimen’s initial test meets the threshold for a positive
    result, but the confirmatory result is reported as “QNS” (Quantity Not Sufficient).
    This occurs when there is not enough specimen to conduct a confirmatory test or
    a confirmatory test must be repeated (following quality control procedures, e.g.
    unacceptable chromatography, poor recovery, or when a sample result is <5% of
    the previous specimen), but insufficient sample remains to complete the repeat
    test. Because the results could not be validated, this should be treated as a
    true quantity insufficiency.
