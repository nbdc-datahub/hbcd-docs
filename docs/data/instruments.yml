  respondent_notes: Pregnant/postpartum person
  admin_notes: Self-collected
  remote: in-person
  duration: 5 min
  qc: Examine assay ranges and categorical versus continuous measures
  warning1: USDTL Screening Updates
  warning1_text: As of May 19, 2025, USDTL transitioned the initial urine screening
    test for fentanyl and sufentanil from LDTD to ELISA. As of November 2025, urine
    samples were no longer assayed for sufentanil, and USDTL simplified its specimen
    validity assessment, replacing a multi-parameter algorithm (including pH and nitrite)
    with a single creatinine-based measure to evaluate urine hydration.
  warning2: Continuous Variables
  warning2_text: Continuous variables should be interpreted with caution based on
    limits of quantification (LOQ), i.e. the minimum concentration at which metabolites
    can be reliably quantified. See <a href="#urine-table1">Urine Assay Thresholds
    for Analytes</a>.
  warning3: Urinary Concentration Corrections
  warning3_text: Urinary concentration varies by participant. Researchers who wish
    to correct for urinary concentration in continuous measures, or apply different
    thresholds, can do so using creatinine or specific gravity results from sample
    validation.
  warning4: Large Gaps Between Collection and Analysis Dates
  warning4_text: A substantial number of samples show unusually long intervals between
    collection and analysis (e.g., over 100–300 days, compared to the 30-day limit
    specified by internal SOPs). We are working to determine whether this reflects
    a data entry or site-level issue and will provide an update once more information
    is available.
