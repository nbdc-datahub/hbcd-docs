  warning1: Background Information
  warning1_text: The Study Navigator Contact Form was created for the HBCD Study as
    a document for characterizing participant contacts and support. The form was developed
    by integrating metrics from documents used in similar support professions (e.g.
    certified peer support, case managers, doulas, social workers, etc.). Use of the
    form was strongly encouraged, but not mandatory for Study Navigators to complete.
  warning2: Variation Across Sites
  warning2_text: There is wide variation across HBCD sites and Study Navigators in
    use of the forms, which should be considered in any analyses conducted and conclusions
    drawn using contact form data. Additionally, some HBCD sites provided study navigator
    support to all participants, and some sites focused support on participants with
    substance use and/or participants experiencing significant adversities.
