  alert1_title: Anonymity
  alert1: Data users are prohibited from using HBCD data, including genomic data,
    to identify participants or their relatives. You accessed these data under a Data
    Use Certification (DUC) agreement in which you and your institution agreed that
    you would not attempt to establish the individual identity of any study participants
    or their relatives. You also agreed to adhere to a minimum cell threshold of 10
    in any public reporting of data (i.e., publications, posters, or other presentations).
    Protecting participants’ anonymity demonstrates respect for them and minimizes
    their research-related risks.
  alert2_title: Population Descriptors
  alert2: The use of population descriptors in genetic research has been varied and
    inconsistent. The National Academies of Science, Engineering, and Medicine (NASEM)
    published a report on the use of population descriptors, such as ancestry, race,
    ethnicity, and geography, in genomics (<a href="https://doi.org/10.17226/26902">https://doi.org/10.17226/26902</a>).
    We encourage data users working with HBCD genomics data to consult the NASEM report
    to understand the past and current use of population descriptors in genomics research
    as well as current best practice recommendations when analyzing or reporting on
    HBCD genomic data. Race and ethnicity represent social constructs that are conceptually
    distinct from ancestry inferred from genetic data. Description of race and ethnicity
    variables in HBCD may be found in <a href="../../demo/basicdemo/#race-ethnicity-variables"
    target="_blank">Basic Demographics</a>.
  alert3_title: Ethical Obligations to Minimize Risks
  alert3: 'Analysts using HBCD data have ethical obligations to minimize risks, including
    psychological, social, and economic risks, to research participants who generously
    provided their data. Risk minimization includes avoiding stigmatizing language
    when describing participants or the populations with which they identify, their
    phenotypes, or their genetic risks. It also includes carefully and clearly articulating
    limitations and caveats when reporting results and discussing how the results
    should and should not be interpreted or generalized.


    Results generated from HBCD data may be used to guide policy (e.g., for social
    services, education, or public health interventions). Researchers should be aware
    of policy implications and controversies related to their research. Some approaches
    for ethically conducting and reporting research using genetic data are discussed
    in <a href="https://doi.org/10.1002/hast.1477">Meyer et al. (2023)</a>, <i>Wrestling
    with Social and Behavioral Genomics: Risks, Potential Benefits, and Ethical Responsibility</i>
    (<b>The Hastings Center Report</b>).


    Researchers cannot control how others, including members of the public and policy
    makers, interpret scientific results we publish. However, we can take steps to
    minimize the likelihood our results will be misinterpreted or overinterpreted.
    In addition to clearly denoting limitations and caveats when reporting results,
    specific approaches for working with genomic data in this context are discussed
    in <a href="https://doi.org/10.1146/annurev-genom-011224-015733">Martshenko et
    al. (2025)</a>, <i>Social and Behavioral Genomics: On the Ethics of the Research
    and Its Downstream Applications</i> (<b>Annual Reviews Genomics and Human Genetics</b>).
    For examples of brief documents that explain social and behavioral genomics for
    non-experts, see “FAQs on Human Genomics Studies” at <a href="https://www.thehastingscenter.org/genomics-research-index/">https://www.thehastingscenter.org/genomics-research-index/</a>.'
  warning1_title: Twins Present in Birth Parents
  warning1: The dataset includes two birth parents who are monozygotic twins (along
    with their respective families), which may complicate certain analyses. The participant
    IDs associated with this twin pair are under internal review and may be shared
    in a future update.
  warning2_title: Data Exclusions
  warning2: A total of 22 samples were excluded from data release (i.e., are not contained
    in the public release files) due to poor genotyping quality (i.e., SNP Missingness
    >10%), unexpected unrelatedness with no confirmed use of reproductive technology,
    unexpected relatedness (i.e., identical samples across adults), and sex check
    mismatch.
