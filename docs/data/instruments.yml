  scoring: 'For each substance, participants indicate whether they had ever used it
    and, if endorsed, frequency of use with options: 0 (Never), 1 (Once or Twice),
    2 (Monthly), 3 (Weekly), or 4 (Daily or Almost Daily). For substances reported
    as used pre-pregnancy, during pregnancy, and end-pregnancy, participants were
    asked about modes of use and typical quantities/amounts of consumption for alcohol
    and opioids (if applicable).'
  alert1_title: V1 & V2
  alert1: 'Responsible use of prenatal drug exposure data requires thoughtful interpretation
    of exposure-related outcomes in the context of measured and unmeasured confounders.
    These confounders include, but are not limited to, phenotypic risks associated
    with persistent alcohol, tobacco, and other drug use during pregnancy by birthing
    parents (<a href="https://doi.org/10.1111/j.1521-0391.2010.00110.x">Massey et
    al., 2010</a>), and confounding by familial risk from within-family studies (<a
    href="https://doi.org/10.1007/s10519-015-9762-2">Estabrook et al., 2016</a>).</p>

    <p>Finally, unwarranted speculation about ‘neural bases of behavior’ form differences
    in neuroimaging between exposed and unexposed children in the absence of differences
    in behavioral performance can exacerbate stigma already faced by birthing parents
    with substance use disorders and their children (<a href="https://doi.org/10.1016/j.ntt.2015.07.002">McAllister
    & Hart 2015</a>).'
  alert2_title: null
  alert2: null
  alert3_title: null
  alert3: null
  warning1_title: null
  warning1: It was difficult for some participants to self-report the typical size
    of a single drink (in oz) to capture ‘standard drinks’ of alcohol for ASSIST,
    leading to some reports falling outside the expected range. Similarly, reporting
    the frequency of use for substances like electronic cigarette devices proved difficult,
    resulting in outliers. While sites were queried on these outliers, participants
    could not always be re-contacted for clarification.
