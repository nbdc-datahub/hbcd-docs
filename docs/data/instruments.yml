  hbcd_mods1_title: Level 1 Modifications
  hbcd_mods1: '"Personality Functioning and Substance Use," present in the original
    measure, was excluded (already captured by a PEX Substance Use instruments).'
  hbcd_mods2_title: Gating Modifications
  hbcd_mods2: Gating procedures were adapted for the HBCD population. Participants
    automatically advanced to the Level 2 Personality Inventory without completing
    Level 1. For Depression and Somatic Symptoms, all participants completed Level
    1 items and proceeded to Level 2 questions regardless of their responses. Future
    publications should acknowledge the removal of Level 1 and Level 2 Substance Use
    measures, as well as the modified gating procedures for Personality Inventory,
    Depression, and Somatic Symptoms.
  hbcd_mods3_title: Level 2 Measures
  hbcd_mods3: 'Level 2 symptom measures for Depression and Sleep Disturbance were
    replaced with the PROMIS Short Forms v1.0 Depression 8a and Sleep Disturbance
    8a. Level 2 also includes the Personality Inventory for DSM-5 Brief, which assesses
    five personality trait domains: Negative Affect, Detachment, Antagonism, Disinhibition,
    and Psychoticism.'
  hbcd_mods4_title: Clinical Alerts
  hbcd_mods4: This measure was modified to alert HBCD study staff when responses exceed
    thresholds of 0 and 32, respectively, on the Level 1 self-harm item (“Thoughts
    of actually hurting yourself?”) or Level 2 Depression items (from “I felt worthless”
    to “I felt that nothing could cheer me up”).
  hbcd_mods5_title: Response Option Changes
  hbcd_mods5: A “Decline to answer” option was added to all questions. A “Don’t know”
    option was initially included, but later removed. Responses marked as “Decline
    to answer” or “Don’t know” are treated as missing data.
