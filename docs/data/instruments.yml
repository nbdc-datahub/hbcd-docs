  alert1_title: null
  alert1: 'HBCD was designed to enable the characterization of the known fluctuation
    in substance use across the perinatal period critical for advancing prevention
    and intervention (<a href="https://doi.org/10.1016/j.ntt.2021.107035">Massey et
    al., 2021</a>, <a href="https://doi.org/10.1016/j.drugalcdep.2022.109351">Bandoli
    et al., 2022</a>, <a href="https://doi.org/10.1016/j.dcn.2024.101432">Si et al.,
    2024</a>).


    Moreover, characterization of between- and within-person variability in substance
    use has been shown to enhance the sensitivity and specificity of risk prediction
    (<a href="https://doi.org/10.1016/j.ntt.2021.107035">Massey et al., 2021</a>,
    <a href="https://doi.org/10.1016/j.ntt.2018.06.002">Massey et al., 2018</a>).
    Thus, the characterization of patterns or trajectories of use should be considered
    over the use of dichotomous exposure characterization. Another gap in literature
    concerns the extent, nature, and implications of polysubstance use during pregnancy
    since individual substances have primarily been examined alone in prior research
    (<a href="https://doi.org/10.1016/j.ntt.2018.06.002">Massey et al., 2018</a>).
    The power and scope of HBCD avails a unique opportunity to understand the prevalence
    and implications of such ‘real world’ patterns of substance use.'
  alert2_title: null
  alert2: null
  alert3_title: null
  alert3: null
  warning1_title: Sampling Window and Coverage Limitations
  warning1: The sampling covers specific weeks before pregnancy (Weeks 1-2) and during
    pregnancy (Weeks 3-9). Consequently, substance use reported outside these weeks
    may not appear in the TLFB, and a positive biospecimen may lack corresponding
    TLFB data for the same reason. This sampling approach balances participant burden
    (avoiding a full 40-week TLFB) with capturing key pregnancy phases when behaviors
    often shift, such as before and after pregnancy recognition and in late pregnancy.
  warning2_title: Notes on Reporting Format and Data Variability
  warning2: Participants were asked to report occasions (except cigarettes/cigarillos
    and drinks, reported as number), but some substances (e.g. electronic cigarette
    devices) are difficult to report in occasions and have outliers.
