apa:
  name: DSM-5 Self-Rated Level 1/2 Cross-Cutting Symptom Measure—Adult (APA 1/2)
  acronym: APA 1/2
  domain: Pregnancy & Exposure, Including Substance Use
  table_name: pex_bm_apa
  construct: Mental Health
  visits: V01 · V02 · V03
  administration: Pregnant participant/primary caregiver survey (not child-specific; 5 min)
  qc: <ul>
      <li>Checks for missing data based on counts for items completed by each participant</li>
      <li>Verification of scoring accuracy</li>
      <li>Summary statistics to examine item-level frequencies and total scores</li>
      <li>Review of response distributions for potential outliers</li>
      </ul>

chaos:
  name: Confusion, Hubbub and Order Scale
  acronym: CHAOS
  domain: Behavior & Caregiver-Child Interaction
  table_name: med_cg_chaos
  construct: Family Organization
  visits: V05 · V07
  administration: Primary caregiver survey (child-specific; 4–8 min)
  qc: <ul>
      <li>Assess missingness (items completed per participant)</li>
      <li>Verify scoring accuracy</li>
      <li>Review summary statistics (item frequencies, total scores)</li>
      <li>Inspect response distributions for outliers</li>
      </ul>

ecpromis_peer:
  name: ecPROMIS Peer Relationships Scale
  acronym: ecPROMIS Peer
  domain: Behavior & Caregiver-Child Interaction
  table_name: med_cg_pms__peer
  construct: Peer Relationships
  visits: V05 · V07 · V09
  administration: Primary caregiver survey (child-specific; 1-2 min)
  qc: <ul>
      <li>Assess missingness (items completed per participant)</li>
      <li>Check age is within expected range</li>
      <li>Review summary statistics (item frequencies, age, prorated scores)</li>
      </ul>

mri_forms:
  name: MRI Scan Session & Data Summary Forms
  acronym: 
  domain: Tabular Imaging
  table_name: mri_ra_chkl_scan / mri_ra_chkl_data
  construct: Pre-/Post-MRI Tech Checklists 1 <i>(Scan Session)</i> & 2 <i>(Data)<i>
  visits: V02 - V06
  administration: Checklists completed by MRI technicians (child-specific)
  qc: Brief visual review of data prior to release to check for errors and missingness

olink:
  name: Olink Explore 384 Inflammation 1 Panel
  acronym: Olink
  domain: Behavior & Caregiver-Child Interaction
  file_tree: |
    └── concatenated/proteins/olink/inflammation/
        ├── Olink_allplates_long.csv
        └── Olink_allplates_wide.csv
  table_name:
  construct: Maternal Inflammation
  visits: V01
  administration: Direct assessment of pregnant participant
  qc: Olink internal assay controls include extension (used for normalization to generate NPX values), incubation, and amplification controls used to monitor assay performance and individual sample quality. See the <a href="https://7074596.fs1.hubspotusercontent-na1.net/hubfs/7074596/01-User%20Manuals%20for%20website/1187-olink-explore-overview-user-manual.pdf">Olink® Explore Overview (<em>section 7.1 Internal controls</em>)</a> for details. Proteins that did not meet Olink’s quality control criteria (N=10) have values of <em>0</em> for <code>{ASSAY}_Count</code> and <em>NA</em> for <code>ExtNPX</code>, <code>NPX</code>, and <code>PCNormalizedNPX</code>.

prescan_q:
  name: Pre-Scan Questionnaire
  acronym: 
  domain: Tabular Imaging
  table_name: mri_ra_prep
  construct: Infant Sleep Environment
  visits: V02 - V06
  administration: Primary caregiver interview (child-specific)
  qc: Data dashboard monitored for variable missingness, coding errors, and data consistency


  # qc: <b>Olink QC</b><br>
  #     Olink internal assay controls include extension (used for normalization to generate NPX values), incubation, and amplification controls used to monitor assay performance and individual sample quality. See the <a href="https://7074596.fs1.hubspotusercontent-na1.net/hubfs/7074596/01-User%20Manuals%20for%20website/1187-olink-explore-overview-user-manual.pdf">Olink® Explore Overview (<em>section 7.1 Internal controls</em>)</a> for details. Proteins that did not meet Olink’s quality control criteria (N=10) have values of <em>0</em> for <code>{ASSAY}_Count</code> and <em>NA</em> for <code>ExtNPX</code>, <code>NPX</code>, and <code>PCNormalizedNPX</code>.
  #     <br>
  #     <br>
  #     <b>Plate Effects</b><br>
  #     Samples were processed across 15 plates (numbered 1–15). Proteins exhibiting plate effects are not excluded from release data. Plate effects were assessed using ANOVA with a p-value threshold of 0.0033 (.05 / 15). Post-hoc analyses showed that these effects were not driven by a small number of outlier plates, but instead reflected broader plate-to-plate variation. A total of 337 proteins demonstrated a plate effect when normalizing by plate control; a total of 46 proteins demonstrated a plate effect when normalizing by median plate intensity.
  #     <br>
  #     <br>
  #     <strong><em>Select “Plate effects only” / “QC failures only” under the <a href="#olink-panel-quick-guide">Panel Quick Guide</a> to view lists of affected assays.</em></strong>
