erica:
  measure: Early Regulation in Context Assessment
  notes: 2 files
  acronym: ERICA
  full_name: Early Regulation in Context Assessment
  domain: Behavior & Caregiver-Child Interactions
  table_name: 'Primary coding data file: mh_cg_erica_3_9m Reliability codes: mh_cg_erica_rel_3_9m'
  construct: Emotional Regulation, Parenting, Caregiver-Child Relationship
  concatenated: null
  concat_filetree: null
  visits: V03
  child_specific: 'Yes'
  type: Parent Interview
  respondent_notes: Birth Parent or Primary Caregiver and Child
  admin_notes: null
  remote: in-person
  duration: 20-30 min
  qc: null
  alert1: null
  alert1_text: 'The HBCD dataset includes many variables that may be important for
    sound and comprehensive analysis. The inclusion of additional variables will depend
    on the research question(s) and methodological approach. Users are encouraged
    to take time to explore the full range of available variables—especially those
    that may serve as controls, contextual indicators, confounders, mechanisms, or
    modifiers—to ensure thoughtful and well-supported analytic decisions. Other important
    considerations may include developmental functioning, broader family supports,
    and early adverse and protective exposures.


    The ERICA assesses variations in child behavior, parenting, and the caregiver-child
    relationship and should be interpreted within the context of the child''s age
    and developmental stage. This is not a clinical or diagnostic instrument.'
  alert2: null
  alert2_text: null
  alert3: null
  alert3_text: null
  warning1: Integrated Analytic Dataset (REQUIRED)
  warning1_text: 'Prior to analysis, you must create a final integrated analytic dataset
    by merging the reliability codes (<code>mh_cg_erica_rel_3_9m</code>) into the
    primary coding data (<code>mh_cg_erica_3_9m</code>). <b>Failure to integrate these
    data prior to analysis will result in incorrect results.</b> In future releases,
    this will not be necessary, as the integrated, analytic data set will be created
    prior to release.

    <br>

    Download the instructions and relevant participant lists <i>(in <a href="https://hbcd-docs-private.lassoinformatics.com">HBCD
    Private Release Notes</a> - DUC access required)</i> as follows:

    <ul>

    <li><a href="../ERICA_2.1_Integrated_Analytic_Data_INSTRUCTIONS.pdf" target="_blank">Integration
    Instructions (PDF)</a></li>

    <li><a href="https://hbcd-docs-private.lassoinformatics.com/participant_lists/ERICA_2.1_DataError_EXCLUSIONS.csv"><code>ERICA_2.1_DataError_EXCLUSIONS.csv</code></a></li>

    <li><a href="https://hbcd-docs-private.lassoinformatics.com/participant_lists/ERICA_2.1_Analytic_REMOVALS.csv"><code>ERICA_2.1_Analytic_REMOVALS.csv</code></a></li></ul>'
  warning2: null
  warning2_text: Data Release 2.1 includes data from ERICA administrations completed
    as part of HBCD study visit 3 (3–9 Month) as of July 1, 2025, utilizing the ERICA
    infant paradigm, which includes a prelocomotor (3–7 month) and locomotor protocol
    (7–9 month).
  warning3: null
  warning3_text: Coded data for a subset of participants may be missing from this
    data release for various reasons. These data will be added in future releases.
  warning4: null
  warning4_text: The ERICA was administered in Spanish and English. The language of
    administration (i.e., language in which RAs delivered the instructions) does not
    always correspond with the language spoken by the caregiver/child during the activities.
    All videos in which the dyad speaks Spanish during the activities were coded by
    fully Spanish-English bilingual coders.
  warning5: null
  warning5_text: The code for "caregiver irritable behavior" in Data Release 2.1 has
    a low base rate because few caregivers exhibited elevated irritability. We recommend
    dichotomizing (0 = 0 and >0 = 1) for analysis.
