site_name: HBCD Data Release Docs

use_directory_urls: true

theme:
  name: material
  # logo: assets/images/Lasso-Logo-Reverse-H.svg
  # favicon: assets/images/favicon-32x32.png
  # custom_dir: docs/overrides # for template overrides, used in this case for addition of "Page Last Updated: <DATE>" to pages
  features:
    - toc.integrate        # merges page TOC into left navigation instead of right sidebar
    - toc.follow           # highlights active section in TOC as you scroll
    - header.autohide      # hides top header on scroll down, reappears when scrolling up
    - content.image.zoom   # click image to open overlay and zoom
    - content.tooltips     # enable tooltips
    - navigation.instant   # faster page loading (SPA-style navigation)
    # - navigation.tracking  # updates URL hash as you scroll through sections
    - navigation.path      # shows breadcrumb-style navigation path at top of page (critical for viewing on small screens/mobile)
    - navigation.footer    # adds "Previous" and "Next" links at bottom of each page
    - search.suggest       # show search suggestions as you type
    - search.highlight     # highlight search terms in results and on page
    - search.share         # add "Share Search" button to results page to copy URL with search query 
    - navigation.expand
 
watch:
  - includes # location of Snippets glossary

markdown_extensions:
  - toc:
      toc_depth: 2
      permalink: true   # adds link icons to copy section URLs 
  - pymdownx.arithmatex
  - pymdownx.snippets

  # Enable use of material tabs
  - pymdownx.tabbed:
      alternate_style: true

  # Enable callout blocks (admonitions) + collapsible
  - admonition
  - pymdownx.details 
  - pymdownx.superfences   

  # CriticMarkup for inline edit annotations (useful for internal notes during dev)
  - pymdownx.critic  

  # Enable tooltips:
  - abbr
  - attr_list

  # Other
  - md_in_html # allow markdown inside HTML 

  # Snippets extension to add glossary
  - pymdownx.snippets:
      auto_append:
        - includes/abbreviations.md

extra:
  generator: false # Remove "Generated by MkDocs" footer
  # analytics:
  # provider: google
  # property: G-BY0EH2K1YQ

extra_javascript:
  - js/extra.js
  - js/ga.js
  - js/gridsearch.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - https://www.googletagmanager.com/gtag/js?id=G-BY0EH2K1YQ
  - https://fonts.googleapis.com/icon?family=Material+Icons
  - https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css

plugins:
  - search
  - git-revision-date-localized:
      type: date  
  - macros
  # - bibtex:
  #     bib_file: "refs/references.bib"

extra_css:
  - css/banners.css
  - css/custom.css
  - css/tables.css
  - overrides/styles.css
  - https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css
  - https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css

