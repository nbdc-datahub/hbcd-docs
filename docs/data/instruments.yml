  scoring: 'The family culture subscore is the mean of the 9 items asking about "family
    culture," whereas the mainstream subscore is the mean of the 9 items asking about
    "American culture."


    Family culture questions are even-numbered: <code>sed_cg_via_006</code> through
    <code>sed_cg_via_022</code>.


    American culture questions are odd-numbered: <code>sed_cg_via_007</code> through
    <code>sed_cg_via_023</code>.


    If a participant chooses 777 ("Decline to answer"), or 999 ("Don''t know"), please
    do not include those values in the mean score calculations.


    High scores on each 9-item subscale can be interpreted as a positive orientation
    toward the specific cultural group and/or higher levels of identification with
    the culture represented. A high score on both subscales is associated with having
    a strong bicultural identity. Subscale mean scores can be used independently and/or
    compared by researchers in a variety of ways, depending on the research question.'
