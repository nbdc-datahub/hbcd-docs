bayley_4:
  measure: Bayley Scales of Infant and Toddler Development, Fourth Edition
  notes: null
  acronym: Bayley-4
  full_name: Bayley Scales of Infant and Toddler Development, Fourth Edition
  domain: Neurocognition & Language
  table_name: ncl_ch_bayley
  construct: Child Development (Cognitive, Language, and Motor)
  concatenated: null
  concat_filetree: null
  visits: V04
  child_specific: 'Yes'
  type: Parent Interview
  respondent_notes: Child
  admin_notes: In person
  remote: in-person
  duration: 60-90 min
  qc:
  - HBCD Study staff were trained and certified by experienced Bayley administrators
    to ensure adherence to standardized procedures.
  - During testing, responses were entered into QGlobal (Pearson’s official scoring
    platform for the Bayley Scales), which automatically applied scoring rules and
    generated standardized scores.
  - Data underwent quality checks at both the individual and cohort levels, including
    range and consistency checks, to identify potential errors or deviations.
  - Completion rates were monitored across sites, with additional training provided
    when needed.
  alert1: null
  alert1_text: 'Performance of the Bayley Scales of Infant and Toddler Development,
    Fourth Edition, reflects the child''s developmental status, but various factors
    might influence the results of the assessment that should be taken into account.


    The test was given in the context of a battery of tests and procedures administered
    to the child and his/her caregiver during the course of an extended visit. Some
    children may experience fatigue from this and this may have adversely impacted
    their performance. Ratings of arousal level of the child before and after the
    assessment may help in identifying situations where the child may have under-performed.


    The child''s exposure to different languages may also impact their performance.
    The Multilingual Language Development questionnaire was used to screen for parental
    preference for the test to be administered in Spanish or English (Spanish language
    translations used are available upon request). The instrument also documents other
    language exposures that the child may have. Exposure to languages other than Spanish
    or English may impact a child''s performance. In addition, some items on the test
    may be impacted by environmental experiences related to the task or items used.
    In these cases, the test may underestimate the child''s developmental status.'
  alert2: null
  alert2_text: null
  alert3: null
  alert3_text: null
  warning1: Missing Records
  warning1_text: A subset of participants are missing the Bayley-4 records, i.e. the
    <b>Administration</b> field (<code>ncl_ch_bayley_administration</code>) has a
    value of 'None.' However, there are a variety of reasons why the data may be missing,
    therefore a value of 'None' does not mean that the Bayley was not administered.
    These data will be added in future releases as it becomes available.
  warning2: Limited Predictive Validity for Long-Term Neurocognitive Status
  warning2_text: Although the Bayley Scales of Infant and Toddler Development, Fourth
    Edition, is a well-established and validated measure of infant development, tests
    of this nature have historically had limited predictive validity for long-term
    neurocognitive status.
  warning3: null
  warning3_text: null
  warning4: null
  warning4_text: null
  warning5: null
  warning5_text: null
  Column 29: null
