bayley_4:
  measure: Bayley Scales of Infant and Toddler Development, Fourth Edition
  domain: Neurocognition & Language
  automation_complete_except_scoring: 'yes'
  notes: null
  version1: null
  version2: null
  acronym: Bayley-4
  full_name: Bayley Scales of Infant and Toddler Development, Fourth Edition
  table_name: ncl_ch_bayley
  table_version1: null
  table_version2: null
  construct: Child Development (Cognitive, Language, and Motor)
  concatenated: null
  visits: V04
  visits_version1: null
  visits_version2: null
  assessment_type: Cognitive testing
  respondent_category: Parent on Child
  administration: In-person
  admin_notes: null
  duration: 60-90 min
  qc:
  - HBCD Study staff were trained and certified by experienced Bayley administrators
    to ensure adherence to standardized procedures.
  - During testing, responses were entered into QGlobal (Pearson’s official scoring
    platform for the Bayley Scales), which automatically applied scoring rules and
    generated standardized scores.
  - Data underwent quality checks at both the individual and cohort levels, including
    range and consistency checks, to identify potential errors or deviations.
  - Completion rates were monitored across sites, with additional training provided
    when needed.
  hbcd_mods1_title: Administration
  hbcd_mods1: The test was designed to be administered by trained clinicians. For
    the HBCD Study, however, administration was performed primarily by trained Research
    Assistants (RAs). HBCD implemented a rigorous training and certification process
    to ensure that all RAs met study-wide standards before conducting assessments.
    For training, subject matter experts (licensed psychologists with expertise in
    infant testing and BSID-4 administration) provided lectures, group discussions,
    and office hours for individualized guidance. To be certified, RAs were required
    to submit both a recorded administration and their QGlobal item-level scoring
    for expert review.
  hbcd_mods2_title: Use of Caregiver Questions
  hbcd_mods2: The use of Caregiver Questions on the BSID-4 was modified. RAs were
    instructed to query the caregiver if the child scored below a 2 on items where
    caregiver input is permitted to inform the assessment. The BSID-4 manual specifies
    using caregiver reports when the target behavior “has not been observed.” It also
    notes that caregiver questions were used in 95% of administrations in the normative
    sample, with no formal limit on their use. The manual indicates that the assessment’s
    validity may be questioned if there are frequent discrepancies between what is
    observed and what is reported.
  hbcd_mods3_title: Accommodations For Spanish-Speaking Households
  hbcd_mods3: Modifications were made to accommodate Spanish-speaking households.
    English instructions were translated by experienced Bayley assessors accustomed
    to administering the BSID-4 in Spanish contexts for infants. The HBCD Spanish
    Language Committee reviewed translations, resolving discrepancies through iterative
    discussion. For families opting for Spanish administration, RAs used the approved
    HBCD Spanish translations of both instructions and caregiver questions. No modifications
    were made to the scoring of the responses and computation of the associated cluster
    and standard scores.
  hbcd_mods4_title: null
  hbcd_mods4: null
  hbcd_mods5_title: null
  hbcd_mods5: null
  scoring: Bayley scores are generated automatically using QGlobal, Pearson’s official
    scoring platform for the Bayley Scales. Scores reflect the standardized scoring
    procedures implemented by Pearson, and no additional manual scoring or modification
    is applied.
  alert1_title: null
  alert1: Performance of the Bayley Scales of Infant and Toddler Development, Fourth
    Edition, reflects the child's developmental status, but various factors might
    influence the results of the assessment that should be taken into account.
  alert2_title: null
  alert2: The test was given in the context of a battery of tests and procedures administered
    to the child and his/her caregiver during the course of an extended visit. Some
    children may experience fatigue from this and this may have adversely impacted
    their performance. Ratings of arousal level of the child before and after the
    assessment may help in identifying situations where the child may have under-performed.
  alert3_title: null
  alert3: The child's exposure to different languages may also impact their performance.
    The Multilingual Language Development questionnaire was used to screen for parental
    preference for the test to be administered in Spanish or English (Spanish language
    translations used are available upon request). The instrument also documents other
    language exposures that the child may have. Exposure to languages other than Spanish
    or English may impact a child's performance. In addition, some items on the test
    may be impacted by environmental experiences related to the task or items used.
    In these cases, the test may underestimate the child's developmental status.
  warning1_title: Missing Records
  warning1: A subset of participants are missing the Bayley-4 records, i.e. the <b>Administration</b>
    field (<code>ncl_ch_bayley_administration</code>) has a value of 'None.' However,
    there are a variety of reasons why the data may be missing, therefore a value
    of 'None' does not mean that the Bayley was not administered. These data will
    be added in future releases as it becomes available.
  warning2_title: Limited Predictive Validity for Long-Term Neurocognitive Status
  warning2: Although the Bayley Scales of Infant and Toddler Development, Fourth Edition,
    is a well-established and validated measure of infant development, tests of this
    nature have historically had limited predictive validity for long-term neurocognitive
    status.
  warning3_title: null
  warning3: null
  warning4_title: null
  warning4: null
  warning5_title: null
  warning5: null
